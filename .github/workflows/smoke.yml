name: smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v3
      - run: bun install --frozen-lockfile
      - run: bun run build:cli
      - run: ./dist/dply --dry-run fixtures/single-html/index.html
      - run: ./dist/dply --dry-run fixtures/static-site
      - run: ./dist/dply --dry-run fixtures/vite-app
