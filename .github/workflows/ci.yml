name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run check
      - run: bun run lint
      - run: bun run build
      - run: bun run smoke:dry:core
      - run: bun run smoke:dry:frameworks
